on:
  push:

jobs:
  hello:
    runs-on: ubunto-latest
    steps:
      - name : Print Hello world
        run: echo "Hello World" 
      - name: Second steps
        run: echo "second"

goodbye:
  name: My Goodbye job
  needs: hello
  run-on: windows-latest
  steps:
    - run: echo "Goodbye"


test:
  name: Test the Python package
  runs-on: ubunto-latest
  steps:
    - name: Install the package
      run: pip install . [test] 
    - name: Run the tests.
      run: pytest -vv 